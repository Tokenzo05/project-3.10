<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Welcome to My Shop</h1>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="storefront.html">Shop</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="hero-intro">
            <h2>Welcome to Our Store</h2>
            <p>Explore our featured products and reach out if you have any questions!</p>
        </section>

        <section id="contact" class="contact-section">
            <h2>Contact Us</h2>
            <form class="contact-form" action="#" method="POST">
                
                <div class="form-group">
                    <label for="sender-name">Name:</label>
                    <input type="text" id="sender-name" name="sender-name" required>
                </div>

                <div class="form-group">
                    <label for="email-address">Email Address:</label>
                    <input type="email" id="email-address" name="email-address" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject">
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5"></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My GitHub Storefront. All rights reserved.</p>
    </footer>

</body>
</html>
